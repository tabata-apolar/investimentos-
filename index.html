function b64ToBuf(b64) {
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf;
}

async function deriveKey(password, saltBuf, iterations) {
  const enc = new TextEncoder();
  const pwKey = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name: 'PBKDF2', salt: saltBuf, iterations: iterations, hash: 'SHA-256' }, pwKey, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
}

async function tryUnlock() {
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('errorMsg');
  const submitBtn = document.getElementById('submitBtn');
  errorEl.classList.remove('show');

  if (!password) {
    errorEl.textContent = 'Digite a senha.';
    errorEl.classList.add('show');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Verificando...';

  try {
    const saltBuf = b64ToBuf(ENC.salt);
    const ivBuf = b64ToBuf(ENC.iv);
    const ctBuf = b64ToBuf(ENC.ct);
    const key = await deriveKey(password, saltBuf, ENC.iter);
    const plaintextBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: ivBuf }, key, ctBuf);
    const plaintext = new TextDecoder().decode(plaintextBuf);
    const payload = JSON.parse(plaintext);

    document.getElementById('injected-style').textContent = payload.style;
    document.getElementById('content-container').innerHTML = payload.body;
    document.getElementById('login').classList.add('hidden');
    document.getElementById('content-container').classList.add('visible');
    document.body.classList.add('unlocked');

    const container = document.getElementById('content-container');
    const scripts = container.querySelectorAll('script');
    scripts.forEach(oldScript => {
      const newScript = document.createElement('script');
      for (const attr of oldScript.attributes) newScript.setAttribute(attr.name, attr.value);
      newScript.text = oldScript.textContent;
      oldScript.parentNode.replaceChild(newScript, oldScript);
    });
  } catch (e) {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Acessar relatório';
    errorEl.textContent = 'Senha incorreta. Tente novamente.';
    errorEl.classList.add('show');
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
    console.error(e);
  }
}

document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
