  #login .footnote strong { color: #475569; }
  #content-container { display: none; }

function b64ToBuf(b64) { const bin = atob(b64); const buf = new Uint8Array(bin.length); for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i); return buf; }
async function deriveKey(p, s, it) { const enc = new TextEncoder(); const pk = await crypto.subtle.importKey('raw', enc.encode(p), 'PBKDF2', false, ['deriveKey']); return crypto.subtle.deriveKey({ name: 'PBKDF2', salt: s, iterations: it, hash: 'SHA-256' }, pk, { name: 'AES-GCM', length: 256 }, false, ['decrypt']); }
async function tryUnlock() {
  const p = document.getElementById('password').value;
  const e = document.getElementById('errorMsg');
  const b = document.getElementById('submitBtn');
  e.classList.remove('show');
  if (!p) { e.textContent='Digite a senha.'; e.classList.add('show'); return; }
  b.disabled = true; b.textContent='Verificando...';
  try {
    const k = await deriveKey(p, b64ToBuf(ENC.salt), ENC.iter);
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv: b64ToBuf(ENC.iv)}, k, b64ToBuf(ENC.ct));
    const pl = JSON.parse(new TextDecoder().decode(pt));
    document.getElementById('injected-style').textContent = pl.style;
    document.getElementById('content-container').innerHTML = pl.body;
    document.getElementById('login').classList.add('hidden');
    document.getElementById('content-container').classList.add('visible');
    document.body.classList.add('unlocked');
    const firstTab = document.querySelector('.tab-pane');
    if (firstTab) firstTab.classList.add('active');
    document.getElementById('content-container').querySelectorAll('script').forEach(os => {
      const ns = document.createElement('script');
      for (const a of os.attributes) ns.setAttribute(a.name, a.value);
      ns.text = os.textContent;
      os.parentNode.replaceChild(ns, os);
    });
  } catch (er) {
    b.disabled = false; b.textContent='Acessar relatório';
    e.textContent='Senha incorreta. Tente novamente.'; e.classList.add('show');
    document.getElementById('password').value=''; document.getElementById('password').focus();
    console.error(er);
  }
}
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
